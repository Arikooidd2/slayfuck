<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Всем писс</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      background: #000;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('photo.jpeg') center/cover no-repeat;
      filter: brightness(0.55);
      z-index: 0;
      animation: zoom 20s infinite alternate;
    }

    @keyframes zoom {
      from { transform: scale(1.05); }
      to { transform: scale(1.12); }
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse, transparent 30%, rgba(0,0,0,0.8));
      z-index: 1;
    }

    .center {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .main-text {
      font-family: 'Bebas Neue';
      font-size: 5rem;
      color: white;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    .tg-btn {
      margin-top: 25px;
      display: inline-block;
      padding: 12px 25px;
      border-radius: 50px;
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      text-decoration: none;
      backdrop-filter: blur(10px);
    }

    /* 🎧 Кастомный плеер */
    .player {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      padding: 15px;
      border-radius: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 10;
    }

    .play-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: white;
      border: none;
      cursor: pointer;
      font-size: 20px;
    }

    .progress {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.2);
      border-radius: 5px;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: white;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="vignette"></div>

<div class="center">
  <div class="main-text">Всем писс<br>мои подпищики</div>
  <a class="tg-btn" href="https://t.me/solllace_1" target="_blank">Написать мне</a>
</div>

<!-- 🎧 Плеер -->
<div class="player">
  <button class="play-btn" id="playBtn">▶</button>
  <div class="progress" id="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<audio id="audio" src="music.mp3"></audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const progress = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');

let isPlaying = false;

// ▶ play / pause
playBtn.onclick = () => {
  if (isPlaying) {
    audio.pause();
    playBtn.textContent = '▶';
  } else {
    audio.play();
    playBtn.textContent = '⏸';
  }
  isPlaying = !isPlaying;
};

// 📊 прогресс
audio.ontimeupdate = () => {
  const percent = (audio.currentTime / audio.duration) * 100;
  progressBar.style.width = percent + '%';
};

// ⏩ перемотка
progress.onclick = (e) => {
  const rect = progress.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;
  audio.currentTime = percent * audio.duration;
};

// ⚡ автостарт после первого действия
const autoPlay = () => {
  audio.play().catch(() => {});
  document.removeEventListener('click', autoPlay);
};
document.addEventListener('click', autoPlay);
</script>

</body>
</html>
