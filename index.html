  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Comic Sans MS', 'Chalkboard SE', system-ui, sans-serif;
      color: #fff;
      background: #1a0033;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* Animated diagonal rainbow stripes — the unmistakable Y2K background */
    .bg-stripes {
      position: fixed; inset: 0; z-index: 0;
      background: repeating-linear-gradient(
        45deg,
        #ff00cc 0 20px,
        #3333ff 20px 40px,
        #00ffe7 40px 60px
      );
      background-size: 600% 600%;
      animation: shift 8s linear infinite;
    }

    @keyframes shift {
      0%   { background-position: 0 0; }
      100% { background-position: 100% 100%; }
    }

    /* Ridged silver frame around everything, inside the browser viewport */
    .frame {
      position: fixed;
      inset: 12px;
      z-index: 1;
      border: 4px ridge silver;
      border-radius: 14px;
      background:
        radial-gradient(circle at 30% 10%, rgba(255,255,255,0.25), transparent 60%),
        linear-gradient(135deg, rgba(0,0,0,0.55), rgba(60,0,90,0.55));
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Marquee strips top + bottom */
    .marquee {
      flex: 0 0 auto;
      overflow: hidden;
      white-space: nowrap;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #ffff66;
      text-shadow: 2px 2px 0 #ff00cc;
      padding: 6px 0;
      border-top: 2px solid #ff00cc;
      border-bottom: 2px solid #00ffe7;
      background: rgba(0,0,0,0.5);
    }
    .marquee span {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 18s linear infinite;
    }
    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    #particles {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* Center content area */
    main.center {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 2vw, 20px);
      padding: 20px;
      min-height: 0;
    }

    .portrait {
      width: clamp(120px, 18vw, 180px);
      height: clamp(120px, 18vw, 180px);
      border-radius: 50%;
      background: url('photo.jpeg') center/cover no-repeat;
      background-image: -webkit-image-set(
        url('photo.webp') type('image/webp') 1x,
        url('photo.jpeg') type('image/jpeg') 1x
      );
      background-image: image-set(
        url('photo.webp') type('image/webp') 1x,
        url('photo.jpeg') type('image/jpeg') 1x
      );
      background-position: center;
      background-size: cover;
      border: 6px double #ff00cc;
      box-shadow: 0 0 40px #ff00cc, 0 0 80px rgba(255,0,204,0.4);
      animation: bob 3s ease-in-out infinite alternate;

    @keyframes bob {
      from { transform: translateY(-4px) rotate(-2deg); }

    .stars {

    .main-text {

    .main-text small {

    }

    .tg-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 2.4vw, 14px);

      color: #000;
      background: linear-gradient(180deg, #ffd5ec 0%, #ff69b4 40%, #cc3388 60%, #ff99cc 100%);
      border: 3px outset #fff;
      border-radius: 8px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.6), 0 0 0 2px #000;
      text-transform: uppercase;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: transform 0.1s;
      touch-action: manipulation;
    }
    .tg-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.6), 0 0 0 2px #000;
    }
    .tg-btn:hover {
      background: linear-gradient(180deg, #ffe0f0 0%, #ff7ac0 40%, #e04aa0 60%, #ffb0dd 100%);
    }

    /* Retro neon visitor counter */
    .hits {
      font-family: 'Press Start 2P', monospace;
      color: #00ff66;
      font-size: 10px;
      background: #000;
      border: 2px solid #00ff66;

      letter-spacing: 0.08em;

    /* Sparkle stars in the corners */
    .sparkle {
      position: absolute;
      font-size: 18px;
      pointer-events: none;
      animation: twinkle 2s infinite;
      z-index: 2;
    }
    @keyframes twinkle {
      0%, 100% { transform: scale(1)   rotate(0);   opacity: 1;   }
      50%      { transform: scale(1.4) rotate(180deg); opacity: 0.4; }
    }

    /* Music button — pixelated Y2K winamp vibe */
    .music-btn {
      position: fixed;
      bottom: 26px;
      right: 26px;
      z-index: 10;
      width: 54px;
      height: 54px;
      border-radius: 10px;
      background: linear-gradient(180deg, #ffd5ec 0%, #ff69b4 50%, #cc3388 100%);
      border: 3px outset #fff;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.6), 0 0 0 2px #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s;
      touch-action: manipulation;
    }
    .music-btn:active {

    }

    .eq-bars {
      display: flex;

      gap: 3px;
      height: 18px;
    }
    .eq-bars span {
      display: block;
      width: 4px;
      background: #fff;
      image-rendering: pixelated;
      animation: eqAnim 0.5s ease-in-out infinite alternate;
      transform-origin: bottom;
    }
    .eq-bars span:nth-child(1) { height: 7px;  animation-duration: 0.5s; animation-delay: 0s;    }
    .eq-bars span:nth-child(2) { height: 16px; animation-duration: 0.7s; animation-delay: 0.15s; }
    .eq-bars span:nth-child(3) { height: 10px; animation-duration: 0.4s; animation-delay: 0.3s;  }
    .eq-bars span:nth-child(4) { height: 14px; animation-duration: 0.6s; animation-delay: 0.1s;  }
    @keyframes eqAnim { to { transform: scaleY(0.25); } }

    .pause-icon { display: none; }
    .music-btn.paused .eq-bars span { animation-play-state: paused; opacity: 0.45; }
    .music-btn.paused .eq-bars { display: none; }
    .music-btn.paused .pause-icon { display: flex; }
    .pause-icon svg { width: 22px; height: 22px; fill: #fff; }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .music-btn { bottom: calc(26px + env(safe-area-inset-bottom)); }
    }

    /* Respect users who prefer less motion */
    @media (prefers-reduced-motion: reduce) {
      .bg-stripes { animation: none; }
      .marquee span { animation: none; padding-left: 0; }
      .portrait { animation: none; }
      .stars { animation: none; opacity: 1; }
      .sparkle { animation: none; }
      .eq-bars span { animation: none; }
    }

  <script>
    /* ── Floating star particles (Y2K version of the petals) ── */
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = ['#ffff66', '#ff00cc', '#00ffe7', '#ffffff'];

    // Scale particle count with viewport to save battery on small devices
    const COUNT = window.innerWidth < 640 ? 18
                : window.innerWidth < 1024 ? 28
                : 40;
    const particles = [];

    function mk(spread) {
      return {
        x:      Math.random() * W,
        y:      spread ? Math.random() * H : -20 - Math.random() * 60,
        r:      3 + Math.random() * 4,
        vy:     0.3 + Math.random() * 0.9,
        vx:     (Math.random() - 0.5) * 0.6,
        rot:    Math.random() * Math.PI * 2,
        rotV:   (Math.random() - 0.5) * 0.05,
        swing:  Math.random() * Math.PI * 2,
        swingS: 0.01 + Math.random() * 0.015,
        swingA: 0.5 + Math.random() * 1.2,
        alpha:  0.4 + Math.random() * 0.5,
        color:  COLORS[Math.floor(Math.random() * COLORS.length)]
      };
    }

    for (let i = 0; i < COUNT; i++) particles.push(mk(true));

    /* A 4-point sparkle shape (+ diamond) — unmistakably Y2K */
    function drawSparkle(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      const r = p.r, r2 = r * 0.35;
      ctx.moveTo(0, -r);
      ctx.lineTo(r2, -r2);
      ctx.lineTo(r, 0);
      ctx.lineTo(r2, r2);
      ctx.lineTo(0, r);
      ctx.lineTo(-r2, r2);
      ctx.lineTo(-r, 0);
      ctx.lineTo(-r2, -r2);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    if (prefersReducedMotion) {
      // Static snapshot for users who prefer reduced motion
      particles.forEach(drawSparkle);
    } else {
      (function loop() {
        if (document.hidden) { requestAnimationFrame(loop); return; }
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          p.swing += p.swingS;
          p.x  += p.vx + Math.sin(p.swing) * p.swingA;
          p.y  += p.vy;
          p.rot += p.rotV;
          drawSparkle(p);
          if (p.y > H + 20) Object.assign(p, mk(false));
        });
        requestAnimationFrame(loop);
      })();
    }

    /* ── Audio: start only on user interaction (browsers block autoplay anyway) ── */
    const audio = document.getElementById('bg-audio');
    const btn   = document.getElementById('musicBtn');
    audio.volume = 0.55;
    let playing = false;

    function setPlaying(val) {
      playing = val;
      btn.classList.toggle('paused', !val);
      btn.setAttribute('aria-pressed', String(val));
      btn.setAttribute('aria-label', val ? 'Выключить музыку' : 'Включить музыку');
    }

    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (playing) {
        audio.pause();
        setPlaying(false);
      } else {
        audio.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
      }
    });

    /* ── PWA: register service worker for offline / installable support ── */
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => { /* first-visit offline is fine */ });
      });
    }
  </script>
