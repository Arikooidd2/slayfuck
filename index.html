<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Всем писс</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      background: #000;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('photo.jpeg') center/cover no-repeat;
      filter: brightness(0.55) saturate(1.2);
      z-index: 0;
      transform: scale(1.05);
      animation: subtleZoom 20s ease-in-out infinite alternate;
    }

    @keyframes subtleZoom {
      from { transform: scale(1.05); }
      to   { transform: scale(1.12); }
    }

    /* Vignette overlay */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.75) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .center {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 20px;
      animation: fadeIn 1.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .main-text {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2.4rem, 8vw, 5.5rem);
      letter-spacing: 0.06em;
      line-height: 1.1;
      color: #fff;
      text-shadow:
        0 0 30px rgba(255,255,255,0.25),
        0 4px 24px rgba(0,0,0,0.9),
        2px 2px 0 rgba(0,0,0,0.6);
      position: relative;
    }

    .main-text::after {
      content: '';
      display: block;
      height: 3px;
      width: 60%;
      margin: 14px auto 0;
      background: linear-gradient(90deg, transparent, #fff, transparent);
      opacity: 0.5;
    }

    /* Telegram button */
    .tg-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 30px;
      padding: 13px 28px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      backdrop-filter: blur(10px);
      transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      cursor: pointer;
    }

    .tg-btn:hover {
      background: rgba(41,182,246,0.25);
      border-color: #29b6f6;
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(41,182,246,0.3);
    }

    .tg-btn svg {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(41,182,246,0.6));
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="vignette"></div>

  <div class="center">
    <div class="main-text">Всем писс<br>мои подпищики</div>

    <a class="tg-btn" href="https://t.me/solllace_1" target="_blank" rel="noopener">
      <!-- Telegram plane icon -->
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="24" fill="#29B6F6"/>
        <path d="M10.5 23.5L37 13L28.5 36L22 28.5L10.5 23.5Z" fill="white"/>
        <path d="M22 28.5L26 25L33 18" stroke="#29B6F6" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 28.5V35L25.5 31" fill="white"/>
      </svg>
      Написать мне
    </a>
  </div>

  <!-- Auto-play audio (muted trick for autoplay policy, then unmute) -->
  <audio id="bg-audio" src="glamur.mp3" preload="auto"></audio>

  <script>
    // Try autoplay; browsers block unmuted autoplay so we try anyway
    const audio = document.getElementById('bg-audio');
    audio.volume = 0.5;
    const tryPlay = () => {
      audio.play().catch(() => {
        // On first user interaction, play
        document.addEventListener('click', () => audio.play(), { once: true });
      });
    };
    window.addEventListener('load', tryPlay);
  </script>

</body>
</html>
