<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Всем писс, мои подписчики</title>
  <meta name="description" content="Всем писс, мои подписчики — личная страничка со ссылкой на Telegram-канал.">

  <!-- Open Graph / Telegram / VK preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Всем писс, мои подписчики">
  <meta property="og:description" content="Личная страничка со ссылкой на Telegram-канал.">
  <meta property="og:image" content="photo.jpeg">

  <!-- Twitter / X preview -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Всем писс, мои подписчики">
  <meta name="twitter:description" content="Личная страничка со ссылкой на Telegram-канал.">
  <meta name="twitter:image" content="photo.jpeg">

  <!-- Inline SVG favicon (no extra request) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23000'/%3E%3Cpath d='M38 18v20a8 8 0 1 1-4-7V14l18-4v24a8 8 0 1 1-4-7V10' fill='none' stroke='%23fff' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Preload above-the-fold assets -->
  <link rel="preload" as="image" href="photo.webp" type="image/webp" fetchpriority="high">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      background: #000;
      -webkit-tap-highlight-color: transparent;
    }

    .bg {
      position: fixed;
      inset: 0;
      /* Modern browsers pick webp; image-set falls back to jpeg for older ones */
      background: url('photo.jpeg') center/cover no-repeat;
      background-image: -webkit-image-set(
        url('photo.webp') type('image/webp') 1x,
        url('photo.jpeg') type('image/jpeg') 1x
      );
      background-image: image-set(
        url('photo.webp') type('image/webp') 1x,
        url('photo.jpeg') type('image/jpeg') 1x
      );
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      filter: brightness(0.55) saturate(1.2);
      z-index: 0;
      transform: scale(1.05);
      animation: subtleZoom 20s ease-in-out infinite alternate;
    }

    @keyframes subtleZoom {
      from { transform: scale(1.05); }
      to   { transform: scale(1.12); }
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.82) 100%);
      z-index: 1;
      pointer-events: none;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .center {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      min-height: 100vh;
    }

    .main-text {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2.2rem, 10vw, 5.5rem);
      letter-spacing: 0.06em;
      line-height: 1.15;
      color: #fff;
      text-shadow:
        0 0 40px rgba(255,255,255,0.2),
        0 4px 24px rgba(0,0,0,0.95),
        2px 2px 0 rgba(0,0,0,0.7);
    }

    .main-text .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px) scale(0.8);
      animation: letterIn 0.4s ease forwards;
    }

    @keyframes letterIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .main-text .line {
      display: block;
    }

    .divider {
      height: 2px;
      width: 0%;
      margin: 16px auto 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
      animation: lineExpand 0.8s ease forwards;
      animation-delay: 1.8s;
    }

    @keyframes lineExpand {
      to { width: 70%; }
    }

    .tg-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      padding: 13px 28px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 50px;
      color: #fff;
      text-decoration: none;
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 2.2s;
      touch-action: manipulation;
    }

    .tg-btn:hover {
      background: rgba(41,182,246,0.22);
      border-color: #29b6f6;
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(41,182,246,0.3);
    }

    .tg-btn:active {
      transform: scale(0.97);
    }

    .tg-btn svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(41,182,246,0.7));
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Music button */
    .music-btn {
      position: fixed;
      bottom: 24px;
      right: 20px;
      z-index: 10;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0,0,0,0.35);
      border: 1.5px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      touch-action: manipulation;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 2.5s;
    }

    .music-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.45); }
    .music-btn:active { transform: scale(0.92); }

    /* Equalizer bars */
    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 18px;
    }

    .eq-bars span {
      display: block;
      width: 3px;
      background: #fff;
      border-radius: 2px;
      animation: eqAnim 0.5s ease-in-out infinite alternate;
      transform-origin: bottom;
    }

    .eq-bars span:nth-child(1) { height: 7px;  animation-duration: 0.5s; animation-delay: 0s;    }
    .eq-bars span:nth-child(2) { height: 16px; animation-duration: 0.7s; animation-delay: 0.15s; }
    .eq-bars span:nth-child(3) { height: 10px; animation-duration: 0.4s; animation-delay: 0.3s;  }
    .eq-bars span:nth-child(4) { height: 14px; animation-duration: 0.6s; animation-delay: 0.1s;  }

    @keyframes eqAnim {
      to { transform: scaleY(0.25); }
    }

    .music-btn.paused .eq-bars span {
      animation-play-state: paused;
      opacity: 0.45;
    }

    /* Pause icon shown when paused */
    .pause-icon { display: none; }
    .music-btn.paused .eq-bars { display: none; }
    .music-btn.paused .pause-icon { display: flex; }

    .pause-icon svg {
      width: 20px;
      height: 20px;
      fill: rgba(255,255,255,0.5);
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .music-btn { bottom: calc(24px + env(safe-area-inset-bottom)); }
    }

    /* Respect users who prefer less motion */
    @media (prefers-reduced-motion: reduce) {
      .bg { animation: none; transform: scale(1.05); }
      .main-text .letter {
        opacity: 1;
        transform: none;
        animation: none;
      }
      .divider { width: 70%; animation: none; }
      .tg-btn,
      .music-btn { opacity: 1; animation: none; }
      .eq-bars span { animation: none; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="vignette"></div>
  <canvas id="particles"></canvas>

  <main class="center">
    <h1 class="main-text" id="mainText"></h1>
    <div class="divider"></div>

    <a class="tg-btn" href="https://t.me/solllace_1" target="_blank" rel="noopener">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="24" fill="#29B6F6"/>
        <path d="M10.5 23.5L37 13L28.5 36L22 28.5L10.5 23.5Z" fill="white"/>
        <path d="M22 28.5L26 25L33 18" stroke="#29B6F6" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 28.5V35L25.5 31" fill="white"/>
      </svg>
      Написать мне
    </a>
  </main>

  <button class="music-btn paused" id="musicBtn" aria-label="Включить музыку" aria-pressed="false">
    <div class="eq-bars">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="pause-icon">
      <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </div>
  </button>

  <audio id="bg-audio" src="glamur.mp3" preload="none" loop></audio>

  <script>
    /* ── Letter animation ── */
    const lines = ['Всем писс', 'мои подписчики'];
    const container = document.getElementById('mainText');
    let delay = 0.1;

    lines.forEach((line, li) => {
      const lineEl = document.createElement('span');
      lineEl.className = 'line';

      [...line].forEach(ch => {
        if (ch === ' ') {
          const sp = document.createElement('span');
          sp.style.display = 'inline-block';
          sp.style.width = '0.3em';
          lineEl.appendChild(sp);
        } else {
          const span = document.createElement('span');
          span.className = 'letter';
          span.textContent = ch;
          span.style.animationDelay = delay + 's';
          delay += 0.065;
          lineEl.appendChild(span);
        }
      });

      container.appendChild(lineEl);
      if (li < lines.length - 1) delay += 0.2;
    });

    /* ── Petals ── */
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = [
      'rgba(255,182,193,',
      'rgba(255,150,170,',
      'rgba(255,210,220,',
      'rgba(255,230,240,',
      'rgba(255,245,248,',
    ];

    // Scale petal count down on smaller / lower-DPR devices to save CPU / battery
    const COUNT = window.innerWidth < 640 ? 25
                : window.innerWidth < 1024 ? 40
                : 55;
    const petals = [];

    function mkPetal(spreadY) {
      return {
        x:      Math.random() * W,
        y:      spreadY ? Math.random() * H : -20 - Math.random() * 60,
        w:      Math.random() * 10 + 6,
        h:      Math.random() * 6 + 4,
        vy:     Math.random() * 1.0 + 0.4,
        vx:     (Math.random() - 0.5) * 0.8,
        rot:    Math.random() * Math.PI * 2,
        rotV:   (Math.random() - 0.5) * 0.04,
        swing:  Math.random() * Math.PI * 2,
        swingS: 0.012 + Math.random() * 0.015,
        swingA: 0.6 + Math.random() * 1.2,
        alpha:  Math.random() * 0.5 + 0.35,
        color:  COLORS[Math.floor(Math.random() * COLORS.length)]
      };
    }

    for (let i = 0; i < COUNT; i++) petals.push(mkPetal(true));

    function drawPetal(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.w / 2, p.h / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = p.color + p.alpha + ')'; 
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(-p.w * 0.1, -p.h * 0.15, p.w * 0.18, p.h * 0.22, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.fill();
      ctx.restore();
    }

    if (prefersReducedMotion) {
      // Draw a static snapshot of petals without animating for users who prefer reduced motion
      petals.forEach(drawPetal);
    } else {
      (function loop() {
        if (document.hidden) { requestAnimationFrame(loop); return; }
        ctx.clearRect(0, 0, W, H);
        petals.forEach(p => {
          p.swing += p.swingS;
          p.x  += p.vx + Math.sin(p.swing) * p.swingA;
          p.y  += p.vy;
          p.rot += p.rotV;
          drawPetal(p);
          if (p.y > H + 20) Object.assign(p, mkPetal(false));
        });
        requestAnimationFrame(loop);
      })();
    }

    /* ── Audio ── */
    const audio = document.getElementById('bg-audio');
    const btn   = document.getElementById('musicBtn');
    audio.volume = 0.55;
    let playing = false;

    function setPlaying(val) {
      playing = val;
      btn.classList.toggle('paused', !val);
      btn.setAttribute('aria-pressed', String(val));
      btn.setAttribute('aria-label', val ? 'Выключить музыку' : 'Включить музыку');
    }

    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (playing) {
        audio.pause();
        setPlaying(false);
      } else {
        audio.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
      }
    });

    /* ── PWA: register service worker for offline / installable support ── */
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => { /* first-visit offline is fine */ });
      });
    }
  </script>

</body>
</html>
